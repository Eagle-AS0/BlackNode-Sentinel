version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: blacknode-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-blacknode_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-blacknode_pass}
      MONGO_INITDB_DATABASE: blacknode-sentinel
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - blacknode-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blacknode-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGODB_URI: mongodb://${MONGODB_USER:-blacknode_user}:${MONGODB_PASSWORD:-blacknode_pass}@mongodb:27017/blacknode-sentinel?authSource=admin
      ML_ENGINE_URL: http://ml-engine:8000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - blacknode-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # ML Detection Engine
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: blacknode-ml-engine
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - blacknode-network
    volumes:
      - ./ml-engine:/app
      - ml_models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: blacknode-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blacknode-network
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  blacknode-network:
    driver: bridge

volumes:
  mongodb_data:
  ml_models:
