version: "3.8"

# ──────────────────────────────────────────────────────────────
# BlackNode Sentinel — Production Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # edit as needed
#   docker compose up --build -d
# ──────────────────────────────────────────────────────────────

services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: blacknode-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-blacknode_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-Dev123!}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-blacknode-sentinel}
    ports:
      - "${MONGO_EXTERNAL_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - blacknode-network
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            db.runCommand('ping').ok;
          } catch (e) {
            print(e);
            process.exit(1);
          }
        "
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blacknode-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_EXTERNAL_PORT:-5004}:5004"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_PORT: 5004
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-blacknode_user}:${MONGO_INITDB_ROOT_PASSWORD:-Dev123!}@mongodb:27017/${MONGO_INITDB_DATABASE:-blacknode-sentinel}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ML_ENGINE_URL: ${ML_ENGINE_URL:-}
      ENABLE_ML_DETECTION: ${ENABLE_ML_DETECTION:-false}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - blacknode-network

  # ── Frontend (Nginx + React SPA) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: blacknode-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - blacknode-network

# ── Networks ──────────────────────────────────────────────────
networks:
  blacknode-network:
    driver: bridge
    name: blacknode-network

# ── Persistent Volumes ───────────────────────────────────────
volumes:
  mongodb_data:
    name: blacknode-mongodb-data
  mongodb_config:
    name: blacknode-mongodb-config
