# ──────────────────────────────────────────────────────────────
# BlackNode Sentinel — Nginx Configuration
# Serves React SPA and proxies API requests to backend
# ──────────────────────────────────────────────────────────────

upstream backend {
    server backend:5004;
    keepalive 32;
}

# Gzip compression settings
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

server {
    listen 3000;
    server_name localhost;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API Proxy → Backend ───────────────────────────────────
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── WebSocket Support (Socket.IO) ─────────────────────────
    location /socket.io/ {
        proxy_pass http://backend/socket.io/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (longer for persistent connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # ── Static Assets — Long-term Cache ───────────────────────
    location /static/ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── JS/CSS Bundle Cache ──────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health Check Endpoint ─────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 '{"status":"OK","service":"frontend"}';
        add_header Content-Type application/json;
    }

    # ── React SPA — All Other Routes ──────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Try file, then directory, then fall back to index.html (SPA routing)
        try_files $uri $uri/ /index.html;

        # Don't cache index.html (so deployments take effect immediately)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Deny Access to Hidden Files ──────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
